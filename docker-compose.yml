version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: healthcare_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-healthcare_risk}
      POSTGRES_USER: ${PG_USER:-pguser}
      POSTGRES_PASSWORD: ${PG_PASS:-pgpassword}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-pguser} -d ${PG_DB:-healthcare_risk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: healthcare_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
