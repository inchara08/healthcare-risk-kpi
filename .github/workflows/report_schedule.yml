name: Weekly Report

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  generate-report:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: healthcare_risk
          POSTGRES_USER: pguser
          POSTGRES_PASSWORD: pgpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Initialize database schema
        run: |
          PGPASSWORD=pgpassword psql -h localhost -U pguser -d healthcare_risk \
            -f src/db/schema.sql
        env:
          PG_HOST: localhost
          PG_USER: pguser
          PG_PASS: pgpassword
          PG_DB: healthcare_risk

      - name: Generate weekly report
        run: python scripts/generate_report.py
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_DB: healthcare_risk
          PG_USER: pguser
          PG_PASS: pgpassword

      - name: Commit report to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: automated weekly report ${{ github.run_number }}"
          file_pattern: "reports/weekly_*.html"
          branch: reports
          create_branch: true
